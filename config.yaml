# ─── Trading Parameters ─────────────────────────────────────
trading:
  # Flash loan
  flash_loan_asset: "WETH"                  # Primary borrow asset
  flash_loan_fee_bps: 9                     # Aave V3 fee: 0.09%

  # Minimum profit thresholds
  min_profit_usd: 5.0                       # Skip opportunities below $5
  min_profit_eth: 0.002                     # ~$6 at ETH=$3000
  min_profit_after_gas_multiplier: 1.5      # Net profit must be 1.5x gas cost

  # Position sizing
  max_flash_loan_eth: 500.0                 # Max single trade size in ETH
  min_flash_loan_eth: 0.1                   # Min flash loan size

  # Slippage
  max_slippage_bps: 50                      # 0.5% max slippage tolerance

  # Gas
  max_gas_price_gwei: 2.0                   # Skip if gas > 2 gwei on Arbitrum
  gas_limit_buffer: 1.3                     # 30% gas estimate buffer

  # Scan interval
  scan_interval_ms: 100                     # Price scan every 100ms
  opportunity_ttl_ms: 500                   # Opportunity expires after 500ms

  # Circuit breaker
  max_consecutive_failures: 5              # Pause after 5 failed txns
  failure_cooldown_seconds: 60             # Wait 60s after circuit break
  max_daily_loss_eth: 1.0                  # Stop trading if daily loss > 1 ETH

# ─── Algorithm Parameters ───────────────────────────────────
algorithms:
  # CMA-ES (Covariance Matrix Adaptation Evolution Strategy)
  cma_es:
    population_size: 32
    initial_sigma: 0.3
    max_iterations: 100
    tolerance: 1e-9

  # Unscented Kalman Filter
  ukf:
    process_noise: 0.001
    measurement_noise: 0.01
    alpha: 1e-3
    beta: 2.0
    kappa: 0.0

  # Thompson Sampling (DEX bandit)
  thompson:
    alpha_init: 1.0
    beta_init: 1.0
    decay_rate: 0.995             # Slowly decay old observations

  # PPO Agent
  ppo:
    hidden_dim: 256
    lr_actor: 3e-4
    lr_critic: 1e-3
    gamma: 0.99
    gae_lambda: 0.95
    clip_epsilon: 0.2
    entropy_coef: 0.01
    update_epochs: 10
    batch_size: 64
    checkpoint_path: "data/ppo_checkpoint.pt"

# ─── RPC Management ─────────────────────────────────────────
rpc:
  health_check_interval_seconds: 10
  latency_ema_alpha: 0.2          # EMA weight for latency tracking
  max_latency_ms: 500             # Mark endpoint as degraded if > 500ms
  reconnect_backoff_seconds: [1, 2, 4, 8, 16]

# ─── Risk Management ────────────────────────────────────────
risk:
  max_open_positions: 1           # Only 1 flash loan at a time
  max_position_size_eth: 200.0
  var_confidence: 0.95            # 95% VaR
  stress_test_multiplier: 3.0

# ─── Monitoring ─────────────────────────────────────────────
monitoring:
  metrics_interval_seconds: 5
  log_trades: true
  alert_on_profit_above_usd: 100  # Send Telegram alert for big wins
  alert_on_loss_above_usd: 50     # Send alert on significant losses
